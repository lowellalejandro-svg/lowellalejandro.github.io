<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - AutoVenta</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">AutoVenta</div>
            <ul class="nav-menu">
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="catalogo.html">Catálogo</a></li>
                <li><a href="contacto.html">Contacto</a></li>
                <li><a href="carrito.html">Carrito (0)</a></li>
            </ul>
        </div>
    </nav>

    <section class="featured-cars">
        <div class="container">
            <h2>Todos Nuestros Autos</h2>
            <div class="cars-grid" id="catalogo"></div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 AutoVenta. Todos los derechos reservados.</p>
            <div class="footer-links">
            </div>
        </div>
    </footer>

    <script>
        // AUTOS DIRECTAMENTE AQUÍ
        const autos = [
            { id: 1, nombre: "Toyota Corolla 2023", precio: 18500, imagen: "../img/auto 1-2.webp", descripcion: "Sedán económico", detalles: "Motor 1.8L, 140 HP" },
            { id: 2, nombre: "Honda Civic 2023", precio: 22000, imagen: "../img/honda civic.jpg", descripcion: "Deportivo eficiente", detalles: "Motor 1.5L Turbo, 174 HP" },
            { id: 3, nombre: "Mazda CX-5 2023", precio: 26000, imagen: "../img/mazda cx-5.jpg", descripcion: "SUV con tracción integral", detalles: "Motor 2.5L, 187 HP, AWD" },
            { id: 4, nombre: "Hyundai Elantra 2023", precio: 17800, imagen: "../img/hyundai eltran.jpg", descripcion: "Sedán compacto y moderno", detalles: "Motor 2.0L, 147 HP" },
            { id: 5, nombre: "Ford Mustang 2023", precio: 35000, imagen: "../img/ford mustang.jpg", descripcion: "Deportivo clásico potente", detalles: "Motor 3.7L V6, 290 HP" },
            { id: 6, nombre: "Chevrolet Cruze 2023", precio: 19500, imagen: "../img/chevrolet cruze.jpg", descripcion: "Sedán versátil y espacioso", detalles: "Motor 1.4L Turbo, 153 HP" },
            { id: 7, nombre: "Nissan Altima 2023", precio: 24000, imagen: "../img/nissan altima.jpg", descripcion: "Sedán premium con confort", detalles: "Motor 2.5L, 182 HP" },
            { id: 8, nombre: "Volkswagen Golf 2023", precio: 23500, imagen: "../img/vilkswagen.jpg", descripcion: "Compacto alemán de calidad", detalles: "Motor 1.4L TSI, 140 HP" }
        ];

        // CARRITO
        let carrito = JSON.parse(localStorage.getItem('carrito')) || [];

        function guardarCarrito() {
            localStorage.setItem('carrito', JSON.stringify(carrito));
        }

        function agregarAlCarrito(idAuto) {
            const auto = autos.find(a => a.id === idAuto);
            const itemExistente = carrito.find(item => item.id === idAuto);
            
            if (itemExistente) {
                itemExistente.cantidad++;
            } else {
                carrito.push({...auto, cantidad: 1});
            }
            
            guardarCarrito();
            alert(auto.nombre + " agregado al carrito");
        }

        function cargarCatalogo() {
            const catalogo = document.getElementById('catalogo');
            catalogo.innerHTML = '';
            
            autos.forEach(auto => {
                const card = document.createElement('div');
                card.className = 'car-card';
                card.innerHTML = `
                    <img src="${auto.imagen}" alt="${auto.nombre}">
                    <h3>${auto.nombre}</h3>
                    <p class="price">$${auto.precio.toLocaleString()}</p>
                    <p class="description">${auto.descripcion}</p>
                    <button class="btn btn-secondary" onclick="agregarAlCarrito(${auto.id})">
                        Agregar al Carrito
                    </button>
                `;
                catalogo.appendChild(card);
            });
        }
        
        // Cargar cuando esté listo
        window.addEventListener('load', cargarCatalogo);
    </script>
</body>
</html>
